<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI视频面试 - 候选人端</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-card-light: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --glow: rgba(99, 102, 241, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景动效 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(99,102,241,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ========== 登录页 ========== */
    .login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .login-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px var(--glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px var(--glow);
    }

    .form-input::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      background: rgba(99,102,241,0.1);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-sm { padding: 8px 16px; font-size: 13px; }

    /* ========== 面试页面 ========== */
    .interview-page {
      display: none;
    }

    /* 顶部栏 */
    .interview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .interview-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .interview-timer {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .timer-dot {
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 主区域 */
    .interview-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* 面试官区域 */
    .interviewer-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .panel-header {
      padding: 12px 20px;
      background: rgba(99,102,241,0.1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .dot-live { background: var(--success); animation: blink 1s infinite; }
    .dot-rec { background: var(--danger); animation: blink 1s infinite; }

    .interviewer-avatar {
      width: 100%;
      aspect-ratio: 16/10;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .avatar-circle {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      margin-bottom: 12px;
      box-shadow: 0 0 30px var(--glow);
    }

    .interviewer-name {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* 语音波形动画 */
    .wave-animation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 30px;
      margin-top: 12px;
    }

    .wave-bar {
      width: 4px;
      background: var(--primary-light);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }
    .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 20px; }
    .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 12px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(2.5); }
    }

    /* 候选人摄像头区域 */
    .candidate-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .camera-container {
      width: 100%;
      aspect-ratio: 16/10;
      background: #000;
      position: relative;
    }

    .camera-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .camera-placeholder svg {
      width: 48px; height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* 提问卡片 */
    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
    }

    .question-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .progress-dots {
      display: flex;
      gap: 6px;
    }

    .progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .progress-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--glow); }
    .progress-dot.done { background: var(--success); }

    .question-text {
      font-size: 18px;
      line-height: 1.7;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .question-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* 语音识别区域 */
    .speech-area {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 80px;
      margin-bottom: 16px;
      position: relative;
    }

    .speech-text {
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      min-height: 20px;
    }

    .speech-placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .speech-listening {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 13px;
    }

    .mic-pulse {
      width: 12px; height: 12px;
      background: var(--danger);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    /* 操作栏 */
    .action-bar {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-mic {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-mic.recording {
      border-color: var(--danger);
      background: rgba(239,68,68,0.15);
      color: var(--danger);
    }

    .btn-mic:hover {
      border-color: var(--primary);
      background: rgba(99,102,241,0.1);
    }

    /* 完成页 */
    .complete-page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    .complete-icon {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(16,185,129,0.3);
      animation: float 3s ease-in-out infinite;
    }

    .complete-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .complete-text {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.6;
      max-width: 400px;
    }

    /* 错误页 */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    .error-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(239,68,68,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
    }

    .error-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .error-text { color: var(--text-secondary); }

    /* 加载 */
    .loading-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 面试记录导出 */
    .transcript-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .transcript-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .transcript-item:last-child { border-bottom: none; }

    .transcript-role {
      font-size: 12px;
      font-weight: 600;
      min-width: 50px;
      padding: 2px 8px;
      border-radius: 4px;
      text-align: center;
    }

    .role-interviewer {
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
    }

    .role-candidate {
      background: rgba(6,182,212,0.15);
      color: var(--accent-light);
    }

    .transcript-content {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .interview-body {
        grid-template-columns: 1fr;
      }
      .action-bar {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- 加载页 -->
  <div class="loading-page" id="loading-page">
    <div class="spinner"></div>
    <div style="color: var(--text-secondary)">加载面试信息...</div>
  </div>

  <!-- 登录页 -->
  <div class="login-page" id="login-page" style="display:none">
    <div class="login-logo">🤖</div>
    <div class="login-title">AI 视频面试</div>
    <div class="login-subtitle" id="position-label"></div>
    <div class="login-card">
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input type="text" id="inp-name" class="form-input" placeholder="请输入您的姓名" required>
      </div>
      <div class="form-group">
        <label class="form-label">邮箱 *</label>
        <input type="email" id="inp-email" class="form-input" placeholder="请输入您的邮箱" required>
      </div>
      <div class="form-group">
        <label class="form-label">电话</label>
        <input type="tel" id="inp-phone" class="form-input" placeholder="选填">
      </div>
      <button class="btn btn-primary" onclick="startInterview()">进入面试</button>
    </div>
  </div>

  <!-- 面试页 -->
  <div class="interview-page" id="interview-page">
    <div class="container">
      <!-- 顶部 -->
      <div class="interview-header">
        <h2>🎯 AI视频面试 - <span id="pos-name"></span></h2>
        <div class="interview-timer">
          <div class="timer-dot"></div>
          <span id="timer">00:00</span>
        </div>
      </div>

      <!-- 双屏区 -->
      <div class="interview-body">
        <!-- 面试官 -->
        <div class="interviewer-panel">
          <div class="panel-header">
            <div class="dot dot-live"></div>
            AI面试官
          </div>
          <div class="interviewer-avatar" id="interviewer-avatar">
            <div class="avatar-circle">🧑‍💼</div>
            <div class="interviewer-name">面试官 · 李明</div>
            <div class="wave-animation" id="wave-anim" style="display:none">
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
          </div>
        </div>

        <!-- 候选人摄像头 -->
        <div class="candidate-panel">
          <div class="panel-header">
            <div class="dot dot-rec" id="rec-dot" style="display:none"></div>
            <span id="cam-label">我的摄像头</span>
          </div>
          <div class="camera-container" id="camera-container">
            <div class="camera-placeholder" id="cam-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
              <div>点击下方按钮开启摄像头</div>
            </div>
            <video id="cam-video" autoplay playsinline style="display:none"></video>
          </div>
        </div>
      </div>

      <!-- 提问卡片 -->
      <div class="question-card" id="question-card">
        <div class="question-progress">
          <span id="q-progress-text">问题 1 / 5</span>
          <div class="progress-dots" id="progress-dots"></div>
        </div>
        <div class="question-text" id="q-text">准备开始面试...</div>
        <div class="question-hint" id="q-hint">请用语音回答，系统将自动记录您的回答</div>
      </div>

      <!-- 语音识别区 -->
      <div class="speech-area" id="speech-area">
        <div class="speech-placeholder" id="speech-placeholder">点击麦克风按钮开始语音回答...</div>
        <div class="speech-text" id="speech-text" style="display:none"></div>
        <div class="speech-listening" id="speech-listening" style="display:none">
          <div class="mic-pulse"></div>
          正在聆听...
        </div>
      </div>

      <!-- 操作栏 -->
      <div class="action-bar">
        <button class="btn-mic" id="btn-mic" onclick="toggleMic()" title="开始/停止录音">🎙️</button>
        <button class="btn btn-outline btn-sm" id="btn-text" onclick="toggleTextInput()">键盘输入</button>
        <div style="flex:1"></div>
        <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" style="display:none">
          下一题 →
        </button>
        <button class="btn btn-success btn-sm" id="btn-finish" onclick="finishInterview()" style="display:none">
          完成面试
        </button>
      </div>

      <!-- 文字输入区 -->
      <div id="text-input-area" style="display:none; margin-top:16px;">
        <textarea id="manual-text" class="form-input" rows="3" placeholder="在此输入您的回答..."></textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="submitManualText()">提交回答</button>
      </div>

      <!-- 面试记录 -->
      <div class="transcript-panel" id="transcript-panel" style="display:none">
        <div style="font-weight:600; margin-bottom:12px;">📝 面试记录</div>
        <div id="transcript-list"></div>
      </div>
    </div>
  </div>

  <!-- 完成页 -->
  <div class="complete-page" id="complete-page">
    <div class="complete-icon">✅</div>
    <div class="complete-title">面试已完成</div>
    <div class="complete-text" id="complete-text"></div>
    <button class="btn btn-outline" style="margin-top:24px" onclick="exportTranscript()">📥 导出面试记录</button>
  </div>

  <!-- 错误页 -->
  <div class="error-page" id="error-page" style="display:none">
    <div class="error-icon">❌</div>
    <div class="error-title" id="error-title">无法开始面试</div>
    <div class="error-text" id="error-text"></div>
  </div>

  <script>
    // ========== 全局状态 ==========
    let interview = null;
    let candidateId = null;
    let currentQIdx = 0;
    let questions = [];
    let answers = {};
    let transcript = [];
    let timerInterval = null;
    let startTime = null;
    let isRecording = false;
    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recognition = null;
    let currentSpeechText = '';
    let cameraOn = false;
    let isSpeaking = false;
    let speechSynth = window.speechSynthesis;

    const urlParams = new URLSearchParams(window.location.search);
    const interviewLink = urlParams.get('link');

    // ========== 初始化 ==========
    async function init() {
      if (!interviewLink) { showError('缺少面试链接参数'); return; }
      if (!initSupabase()) { showError('系统加载失败'); return; }

      const { data, error } = await API.getInterviewByLink(interviewLink);
      if (error || !data) { showError('面试邀请不存在或已过期'); return; }
      if (data.status === 'cancelled') { showError('此面试邀请已被取消'); return; }
      if (data.expires_at && new Date(data.expires_at) < new Date()) { showError('面试邀请已过期'); return; }

      interview = data;
      questions = data.questions || [];
      document.getElementById('position-label').textContent = interview.positions?.name || '在线面试';

      hideAll();
      document.getElementById('login-page').style.display = 'flex';
    }

    function hideAll() {
      ['loading-page','login-page','interview-page','complete-page','error-page'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
    }

    function showError(msg) {
      hideAll();
      document.getElementById('error-page').style.display = 'flex';
      document.getElementById('error-text').textContent = msg;
    }

    // ========== 开始面试 ==========
    async function startInterview() {
      const name = document.getElementById('inp-name').value.trim();
      const email = document.getElementById('inp-email').value.trim();
      const phone = document.getElementById('inp-phone').value.trim();
      if (!name || !email) { alert('请填写姓名和邮箱'); return; }

      const { data, error } = await API.createCandidate(name, email, phone, interview.positions?.id, interviewLink);
      if (error) { alert('提交失败，请重试'); return; }

      candidateId = data[0].id;

      // 更新邀请状态
      if (interview.id) {
        API.updateInviteStatus(interview.id, 'in_progress');
      }

      hideAll();
      document.getElementById('interview-page').style.display = 'block';
      document.getElementById('pos-name').textContent = interview.positions?.name || '';

      // 开启摄像头
      openCamera();

      // 开始计时
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);

      // 初始化语音识别
      initSpeechRecognition();

      // 渲染第一题
      renderQuestion();
    }

    // ========== 摄像头 ==========
    async function openCamera() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const video = document.getElementById('cam-video');
        video.srcObject = mediaStream;
        video.style.display = 'block';
        document.getElementById('cam-placeholder').style.display = 'none';
        document.getElementById('cam-label').textContent = '我的摄像头 · 已开启';
        cameraOn = true;

        // 开始录制
        startRecording();
      } catch (e) {
        console.warn('摄像头无法开启:', e);
        document.getElementById('cam-label').textContent = '摄像头未开启';
      }
    }

    function startRecording() {
      if (!mediaStream) return;
      try {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm;codecs=vp9' });
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.start(1000);
        document.getElementById('rec-dot').style.display = 'block';
      } catch (e) {
        console.warn('录制启动失败:', e);
        try {
          mediaRecorder = new MediaRecorder(mediaStream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
          };
          mediaRecorder.start(1000);
          document.getElementById('rec-dot').style.display = 'block';
        } catch(e2) {
          console.warn('录制完全失败:', e2);
        }
      }
    }

    // ========== 语音识别 ==========
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('浏览器不支持语音识别');
        return;
      }
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'zh-CN';

      recognition.onresult = (event) => {
        let final = '';
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            final += event.results[i][0].transcript;
          } else {
            interim += event.results[i][0].transcript;
          }
        }
        if (final) currentSpeechText += final;
        const display = currentSpeechText + (interim ? `<span style="color:var(--text-muted)">${interim}</span>` : '');
        document.getElementById('speech-text').innerHTML = display || '';
      };

      recognition.onerror = (e) => {
        console.warn('语音识别错误:', e.error);
        if (e.error !== 'no-speech') {
          // 自动重启
          if (isRecording) {
            try { recognition.start(); } catch(e) {}
          }
        }
      };

      recognition.onend = () => {
        if (isRecording) {
          try { recognition.start(); } catch(e) {}
        }
      };
    }

    function toggleMic() {
      if (isRecording) {
        stopMic();
      } else {
        startMic();
      }
    }

    function startMic() {
      if (!recognition) {
        alert('您的浏览器不支持语音识别，请使用Chrome浏览器或使用键盘输入');
        return;
      }
      isRecording = true;
      currentSpeechText = '';
      document.getElementById('btn-mic').classList.add('recording');
      document.getElementById('btn-mic').textContent = '⏹️';
      document.getElementById('speech-placeholder').style.display = 'none';
      document.getElementById('speech-text').style.display = 'block';
      document.getElementById('speech-listening').style.display = 'flex';
      try { recognition.start(); } catch(e) {}
    }

    function stopMic() {
      isRecording = false;
      document.getElementById('btn-mic').classList.remove('recording');
      document.getElementById('btn-mic').textContent = '🎙️';
      document.getElementById('speech-listening').style.display = 'none';
      try { recognition.stop(); } catch(e) {}

      // 保存当前回答
      if (currentSpeechText.trim()) {
        saveCurrentAnswer(currentSpeechText.trim());
      }
    }

    function toggleTextInput() {
      const area = document.getElementById('text-input-area');
      area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    function submitManualText() {
      const text = document.getElementById('manual-text').value.trim();
      if (!text) return;
      currentSpeechText += text;
      document.getElementById('speech-text').style.display = 'block';
      document.getElementById('speech-text').innerHTML += text;
      document.getElementById('speech-placeholder').style.display = 'none';
      saveCurrentAnswer(currentSpeechText.trim());
      document.getElementById('manual-text').value = '';
    }

    function saveCurrentAnswer(text) {
      const q = questions[currentQIdx];
      if (!q) return;
      answers[q.id] = text;

      // 添加到转录记录
      transcript.push({
        role: 'candidate',
        content: text,
        questionId: q.id,
        time: new Date().toLocaleTimeString('zh-CN')
      });

      renderTranscript();

      // 显示下一题/完成按钮
      if (currentQIdx < questions.length - 1) {
        document.getElementById('btn-next').style.display = 'inline-flex';
      } else {
        document.getElementById('btn-finish').style.display = 'inline-flex';
      }
    }

    // ========== TTS 面试官提问 ==========
    function speakQuestion(text) {
      if (!speechSynth) return;
      speechSynth.cancel();

      // 显示波形
      document.getElementById('wave-anim').style.display = 'flex';
      isSpeaking = true;

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      // 选择中文语音
      const voices = speechSynth.getVoices();
      const zhVoice = voices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) utterance.voice = zhVoice;

      utterance.onend = () => {
        document.getElementById('wave-anim').style.display = 'none';
        isSpeaking = false;
      };

      utterance.onerror = () => {
        document.getElementById('wave-anim').style.display = 'none';
        isSpeaking = false;
      };

      speechSynth.speak(utterance);

      // 添加到转录
      transcript.push({
        role: 'interviewer',
        content: text,
        time: new Date().toLocaleTimeString('zh-CN')
      });
    }

    // ========== 渲染题目 ==========
    function renderQuestion() {
      if (currentQIdx >= questions.length) return;

      const q = questions[currentQIdx];
      currentSpeechText = '';
      document.getElementById('speech-text').innerHTML = '';
      document.getElementById('speech-text').style.display = 'none';
      document.getElementById('speech-placeholder').style.display = 'block';
      document.getElementById('speech-listening').style.display = 'none';
      document.getElementById('btn-next').style.display = 'none';
      document.getElementById('btn-finish').style.display = 'none';
      document.getElementById('text-input-area').style.display = 'none';
      document.getElementById('manual-text').value = '';

      // 更新进度
      document.getElementById('q-progress-text').textContent = `问题 ${currentQIdx + 1} / ${questions.length}`;
      document.getElementById('q-text').textContent = q.question;
      document.getElementById('q-hint').textContent = q.answer_template ? `提示：${q.answer_template}` : '请用语音回答，系统将自动记录';

      // 进度点
      const dotsHtml = questions.map((_, i) => {
        let cls = 'progress-dot';
        if (i < currentQIdx) cls += ' done';
        else if (i === currentQIdx) cls += ' active';
        return `<div class="${cls}"></div>`;
      }).join('');
      document.getElementById('progress-dots').innerHTML = dotsHtml;

      // 如果已有答案
      if (answers[q.id]) {
        currentSpeechText = answers[q.id];
        document.getElementById('speech-text').style.display = 'block';
        document.getElementById('speech-text').textContent = answers[q.id];
        document.getElementById('speech-placeholder').style.display = 'none';
        if (currentQIdx < questions.length - 1) {
          document.getElementById('btn-next').style.display = 'inline-flex';
        } else {
          document.getElementById('btn-finish').style.display = 'inline-flex';
        }
      }

      // 面试官语音提问
      const greetings = [
        '好的，',
        '接下来，',
        '那么，',
        '很好，',
        '我想了解一下，'
      ];
      const prefix = currentQIdx === 0
        ? `你好！欢迎参加${interview.positions?.name || ''}岗位的面试。我是你的AI面试官李明。让我们开始吧。第一题：`
        : greetings[Math.floor(Math.random() * greetings.length)];
      speakQuestion(prefix + q.question);

      renderTranscript();
    }

    function nextQuestion() {
      if (isRecording) stopMic();
      currentQIdx++;
      renderQuestion();
    }

    // ========== 转录记录 ==========
    function renderTranscript() {
      const panel = document.getElementById('transcript-panel');
      const list = document.getElementById('transcript-list');
      if (transcript.length === 0) { panel.style.display = 'none'; return; }
      panel.style.display = 'block';
      list.innerHTML = transcript.map(t => `
        <div class="transcript-item">
          <span class="transcript-role ${t.role === 'interviewer' ? 'role-interviewer' : 'role-candidate'}">
            ${t.role === 'interviewer' ? '面试官' : '我'}
          </span>
          <div class="transcript-content">${t.content}</div>
          <span style="color:var(--text-muted);font-size:12px;white-space:nowrap">${t.time}</span>
        </div>
      `).join('');
      list.scrollTop = list.scrollHeight;
    }

    // ========== 计时器 ==========
    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    // ========== 完成面试 ==========
    async function finishInterview() {
      if (isRecording) stopMic();
      if (speechSynth) speechSynth.cancel();
      clearInterval(timerInterval);

      const durationSeconds = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;

      // 保存答案到数据库
      for (const q of questions) {
        if (answers[q.id]) {
          await API.submitAnswer(candidateId, q.id, answers[q.id]);
        }
      }

      // 保存面试记录
      const transcriptText = transcript.map(t =>
        `[${t.time}] ${t.role === 'interviewer' ? '面试官' : '候选人'}: ${t.content}`
      ).join('\n');

      await API.saveInterviewRecord(candidateId, {
        positionId: interview.positions?.id,
        transcript: transcriptText,
        durationSeconds,
        questionCount: questions.length,
        status: 'completed'
      });

      // 更新邀请状态
      if (interview.id) {
        API.updateInviteStatus(interview.id, 'completed');
      }

      // 停止录制和摄像头
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
      }

      // 显示完成页
      hideAll();
      document.getElementById('complete-page').style.display = 'flex';
      const m = Math.floor(durationSeconds / 60);
      const s = durationSeconds % 60;
      document.getElementById('complete-text').innerHTML = `
        感谢您参加 <strong>${interview.positions?.name || ''}</strong> 岗位的面试！<br>
        面试时长：${m}分${s}秒 · 共回答 ${Object.keys(answers).length} 题<br><br>
        我们会尽快与您联系，请保持电话/邮箱畅通。
      `;
    }

    // ========== 导出记录 ==========
    function exportTranscript() {
      let content = `面试记录导出\n`;
      content += `================\n`;
      content += `岗位: ${interview.positions?.name || ''}\n`;
      content += `日期: ${new Date().toLocaleDateString('zh-CN')}\n`;
      if (startTime) {
        const d = Math.floor((Date.now() - startTime) / 1000);
        content += `时长: ${Math.floor(d/60)}分${d%60}秒\n`;
      }
      content += `\n================\n\n`;

      transcript.forEach(t => {
        content += `[${t.time}] ${t.role === 'interviewer' ? '面试官' : '候选人'}:\n${t.content}\n\n`;
      });

      // 下载视频（如果有录制）
      if (recordedChunks.length > 0) {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `面试视频_${interview.positions?.name || ''}_${new Date().toLocaleDateString('zh-CN')}.webm`;
        a.click();
        URL.revokeObjectURL(url);
      }

      // 下载文字记录
      const textBlob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const textUrl = URL.createObjectURL(textBlob);
      const ta = document.createElement('a');
      ta.href = textUrl;
      ta.download = `面试记录_${interview.positions?.name || ''}_${new Date().toLocaleDateString('zh-CN')}.txt`;
      ta.click();
      URL.revokeObjectURL(textUrl);
    }

    // ========== 加载语音 ==========
    if (speechSynth) {
      speechSynth.onvoiceschanged = () => speechSynth.getVoices();
    }

    // 启动
    init();
  </script>
</body>
