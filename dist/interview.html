<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI视频面试 - 候选人端</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-card-light: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --glow: rgba(99, 102, 241, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(99,102,241,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ========== 登录页 ========== */
    .login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .login-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px var(--glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-size: 16px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px var(--glow);
    }

    .form-input::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }

    .btn-lg {
      padding: 14px 32px;
      font-size: 17px;
      border-radius: 12px;
    }

    .btn-sm { padding: 8px 16px; font-size: 13px; }

    /* ========== 面试页面 ========== */
    .interview-page {
      display: none;
    }

    .interview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .interview-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .interview-timer {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .timer-dot {
      width: 8px; height: 8px;
      background: var(--danger);
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .interview-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .interviewer-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 20px;
      background: rgba(99,102,241,0.1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .dot-live { background: var(--success); animation: blink 1s infinite; }
    .dot-rec { background: var(--danger); animation: blink 1s infinite; }

    .interviewer-avatar {
      width: 100%;
      aspect-ratio: 16/10;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .avatar-circle {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      margin-bottom: 12px;
      box-shadow: 0 0 30px var(--glow);
    }

    .interviewer-name {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .wave-animation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 30px;
      margin-top: 12px;
    }

    .wave-bar {
      width: 4px;
      background: var(--primary-light);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .wave-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }
    .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 20px; }
    .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 12px; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(2.5); }
    }

    .candidate-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .camera-container {
      width: 100%;
      aspect-ratio: 16/10;
      background: #000;
      position: relative;
    }

    .camera-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .camera-placeholder svg {
      width: 48px; height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
    }

    .question-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .progress-dots {
      display: flex;
      gap: 6px;
    }

    .progress-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .progress-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--glow); }
    .progress-dot.done { background: var(--success); }

    .question-text {
      font-size: 18px;
      line-height: 1.7;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .question-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* 语音识别区域 */
    .speech-area {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 80px;
      margin-bottom: 16px;
      position: relative;
    }

    .speech-text {
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      min-height: 20px;
    }

    .speech-placeholder {
      color: var(--text-muted);
      font-size: 14px;
    }

    .speech-listening {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 13px;
    }

    .mic-pulse {
      width: 12px; height: 12px;
      background: var(--danger);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    /* 操作按钮区 */
    .action-buttons {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
    }

    .btn-next {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
    }

    .btn-next:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-finish {
      background: linear-gradient(135deg, var(--success), #059669);
      color: #fff;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
    }

    .btn-finish:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }

    /* 完成页 */
    .complete-page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    .complete-icon {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(16,185,129,0.3);
      animation: float 3s ease-in-out infinite;
    }

    .complete-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .complete-text {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.6;
      max-width: 400px;
    }

    /* 错误页 */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    .error-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(239,68,68,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
    }

    .error-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .error-text { color: var(--text-secondary); }

    /* 加载 */
    .loading-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 面试记录（实时转录，仅展示用） */
    .transcript-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
    }

    .transcript-item {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(51,65,85,0.5);
    }

    .transcript-item:last-child { border-bottom: none; }

    .transcript-role {
      font-size: 11px;
      font-weight: 600;
      min-width: 44px;
      padding: 2px 6px;
      border-radius: 4px;
      text-align: center;
    }

    .role-interviewer {
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
    }

    .role-candidate {
      background: rgba(6,182,212,0.15);
      color: var(--accent-light);
    }

    .transcript-content {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    /* 语音状态提示 */
    .speech-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 14px;
      color: var(--accent);
      min-height: 24px;
    }

    .speech-status .recording-dot {
      width: 10px; height: 10px;
      background: var(--danger);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .interview-body {
        grid-template-columns: 1fr;
      }
      .action-buttons {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- 加载页 -->
  <div class="loading-page" id="loading-page">
    <div class="spinner"></div>
    <div style="color: var(--text-secondary)">加载面试信息...</div>
  </div>

  <!-- 登录页 -->
  <div class="login-page" id="login-page" style="display:none">
    <div class="login-logo">🤖</div>
    <div class="login-title">AI 视频面试</div>
    <div class="login-subtitle" id="position-label"></div>
    <div class="login-card">
      <div class="form-group">
        <label class="form-label">姓名 *</label>
        <input type="text" id="inp-name" class="form-input" placeholder="请输入您的姓名" required>
      </div>
      <div class="form-group">
        <label class="form-label">邮箱 *</label>
        <input type="email" id="inp-email" class="form-input" placeholder="请输入您的邮箱" required>
      </div>
      <div class="form-group">
        <label class="form-label">电话</label>
        <input type="tel" id="inp-phone" class="form-input" placeholder="选填">
      </div>
      <button class="btn btn-primary" onclick="startInterview()">进入面试</button>
    </div>
  </div>

  <!-- 面试页 -->
  <div class="interview-page" id="interview-page">
    <div class="container">
      <!-- 顶部 -->
      <div class="interview-header">
        <h2>🎯 AI视频面试 - <span id="pos-name"></span></h2>
        <div class="interview-timer">
          <div class="timer-dot"></div>
          <span id="timer">00:00</span>
        </div>
      </div>

      <!-- 双屏区 -->
      <div class="interview-body">
        <!-- 面试官 -->
        <div class="interviewer-panel">
          <div class="panel-header">
            <div class="dot dot-live"></div>
            AI面试官
          </div>
          <div class="interviewer-avatar" id="interviewer-avatar">
            <div class="avatar-circle">🧑‍💼</div>
            <div class="interviewer-name">面试官 · 李明</div>
            <div class="wave-animation" id="wave-anim" style="display:none">
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
          </div>
        </div>

        <!-- 候选人摄像头 -->
        <div class="candidate-panel">
          <div class="panel-header">
            <div class="dot dot-rec" id="rec-dot" style="display:none"></div>
            <span id="cam-label">我的摄像头</span>
          </div>
          <div class="camera-container" id="camera-container">
            <div class="camera-placeholder" id="cam-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
              <div>摄像头将自动开启</div>
            </div>
            <video id="cam-video" autoplay playsinline style="display:none"></video>
          </div>
        </div>
      </div>

      <!-- 提问卡片 -->
      <div class="question-card" id="question-card">
        <div class="question-progress">
          <span id="q-progress-text">问题 1 / 5</span>
          <div class="progress-dots" id="progress-dots"></div>
        </div>
        <div class="question-text" id="q-text">准备开始面试...</div>
        <div class="question-hint" id="q-hint">请用语音回答以下问题，系统将自动识别您说的内容</div>
      </div>

      <!-- 语音识别区（后台运行，候选人端不展示识别过程） -->
      <div class="speech-area" id="speech-area" style="display:none">
        <div class="speech-placeholder" id="speech-placeholder">系统正在聆听您的回答...</div>
        <div class="speech-text" id="speech-text"></div>
        <div class="speech-listening" id="speech-listening">
          <div class="mic-pulse"></div>
          正在聆听您的回答...
        </div>
      </div>

      <!-- 状态提示 -->
      <div class="speech-status" id="speech-status"></div>

      <!-- 下一题 / 完成面试 按钮（始终显示） -->
      <div class="action-buttons">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">
          下一题 →
        </button>
        <button class="btn-finish" id="btn-finish" onclick="finishInterview()">
          完成面试 ✓
        </button>
      </div>

      <!-- 实时转录（后台记录，候选人端不展示） -->
      <div class="transcript-panel" id="transcript-panel" style="display:none">
        <div style="font-weight:600; margin-bottom:8px; font-size:13px">📝 面试过程记录</div>
        <div id="transcript-list"></div>
      </div>
    </div>
  </div>

  <!-- 完成页（纯感谢，无下载按钮） -->
  <div class="complete-page" id="complete-page">
    <div class="complete-icon">✅</div>
    <div class="complete-title">面试已完成</div>
    <div class="complete-text" id="complete-text"></div>
  </div>

  <!-- 错误页 -->
  <div class="error-page" id="error-page" style="display:none">
    <div class="error-icon">❌</div>
    <div class="error-title" id="error-title">无法开始面试</div>
    <div class="error-text" id="error-text"></div>
  </div>

  <script>
    // ========== 全局状态 ==========
    let interview = null;
    let candidateId = null;
    let currentQIdx = 0;
    let questions = [];
    let answers = {};
    let transcript = [];
    let timerInterval = null;
    let startTime = null;
    let isRecording = false;
    let mediaStream = null;
    let recognition = null; // 保留变量名兼容，实际不再使用
    let currentSpeechText = '';
    let cameraOn = false;
    let speechSynth = window.speechSynthesis;
    let hasAnswered = false;
    let isFinishing = false;

    let xfIatWebSocket = null;     // WebSocket 连接

    let xfMediaStreamSource = null;
    let xfScriptProcessor = null;  // ScriptProcessorNode 用于音频处理
    let xfRecognitionActive = false; // 讯飞识别是否活跃
    let xfResultText = '';         // 当前识别结果
    let xfRestartTimer = null;     // 60秒自动重启定时器

    const urlParams = new URLSearchParams(window.location.search);

    // ========== 初始化 ==========
    async function init() {
      if (!interviewLink) { showError('缺少面试链接参数'); return; }

    // ========== 开始面试 ==========

    // ========== 摄像头 + 视频录制 ==========
    let videoRecorder = null;        // MediaRecorder 实例
    let videoChunks = [];            // 录制的数据片段
    let videoRecording = false;      // 是否正在录制

    async function openCamera() {
      try {
        // 请求720p摄像头 + 麦克风
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true
        });
        const video = document.getElementById('cam-video');
        video.srcObject = mediaStream;
        video.style.display = 'block';
        document.getElementById('cam-placeholder').style.display = 'none';
        document.getElementById('cam-label').textContent = '我的摄像头 · 已开启';
        cameraOn = true;
        document.getElementById('rec-dot').style.display = 'block';

        // 开始录制视频
        startVideoRecording();
      } catch (e) {
        console.warn('摄像头无法开启:', e);
        document.getElementById('cam-label').textContent = '摄像头未开启';
      }
    }

    // 开始录制视频
    function startVideoRecording() {
      if (!mediaStream) return;
      try {
        // 优先使用 webm 格式，兼容性好
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
          ? 'video/webm;codecs=vp8,opus'
          : MediaRecorder.isTypeSupported('video/webm')
            ? 'video/webm'
            : 'video/mp4';

        videoRecorder = new MediaRecorder(mediaStream, {
          mimeType: mimeType,
          videoBitsPerSecond: 1500000  // 1.5Mbps，720p约50-100MB/小时
        });
        videoChunks = [];

        videoRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) {
            videoChunks.push(e.data);
          }
        };

        videoRecorder.onstop = () => {
          console.log('[视频录制] 录制停止，共', videoChunks.length, '个片段');
        };

        // 每5秒产生一个数据片段
        videoRecorder.start(5000);
        videoRecording = true;
        console.log('[视频录制] 开始录制，格式:', mimeType);
      } catch(e) {
        console.error('[视频录制] 启动失败:', e);
        videoRecorder = null;
      }
    }

    // 停止录制并返回视频Blob
    function stopVideoRecording() {
      return new Promise((resolve) => {
        if (!videoRecorder || videoRecorder.state === 'inactive') {
          videoRecording = false;
          resolve(null);
          return;
        }

        videoRecorder.onstop = () => {
          videoRecording = false;
          if (videoChunks.length === 0) {
            console.warn('[视频录制] 没有录制到数据');
            resolve(null);
            return;
          }
          const blob = new Blob(videoChunks, { type: videoRecorder.mimeType });
          console.log('[视频录制] 视频生成完成，大小:', (blob.size / 1024 / 1024).toFixed(2), 'MB');
          resolve(blob);
        };

        videoRecorder.stop();
      });
    }

    // ========== 语音识别（讯飞语音听写 WebSocket API） ==========
    let ttsTimeout = null; // TTS onend 超时保护

    // 讯飞配置
    const XF_APPID = 'ae1420df';
    const XF_API_SECRET = 'Y2ZlMTM1MzdkMmNhN2M3OWNhNmU0NjA3';
    const XF_API_KEY = '807f66c6a6d0b5d6d314d9593f0ac459';
    const XF_IAT_URL = 'wss://iat-api.xfyun.cn/v2/iat';

    function initSpeechRecognition() {
      // 讯飞模式无需初始化 recognition 对象，在 startAutoRecognition 时按需连接
      console.log('[语音识别] 讯飞语音听写模式，无需预初始化');
    }

    // 生成讯飞鉴权URL
    function getXfAuthUrl() {
      const url = new URL(XF_IAT_URL);
      const host = url.host;
      const path = url.pathname;
      const now = new Date().toUTCString();
      const signatureOrigin = `host: ${host}\ndate: ${now}\nGET ${path} HTTP/1.1`;
      const signature = CryptoJS.HmacSHA256(signatureOrigin, XF_API_SECRET);
      const authorization = `api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${CryptoJS.enc.Base64.stringify(signature)}"`;
      return `${XF_IAT_URL}?authorization=${encodeURIComponent(btoa(authorization))}&date=${encodeURIComponent(now)}&host=${encodeURIComponent(host)}`;
    }

    // 启动讯飞语音听写
    function startAutoRecognition() {
      // 先停止之前的识别
      stopAutoRecognition();

      isRecording = true;
      autoRecognizing = true;
      currentSpeechText = '';
      hasAnswered = false;
      xfResultText = '';
      xfRecognitionActive = true;

      console.log('[语音识别] 启动讯飞语音听写');
      document.getElementById('speech-status').innerHTML = '<div class="recording-dot"></div> 请开始回答...';
      updateActionButtons();

      // 连接讯飞WebSocket
      connectXfIat();
    }

    // 连接讯飞WebSocket
    function connectXfIat() {
      if (!xfRecognitionActive) return;

      try {
        const authUrl = getXfAuthUrl();
        console.log('[语音识别] 正在连接讯飞服务器...');
        xfIatWebSocket = new WebSocket(authUrl);
      } catch(e) {
        console.error('[语音识别] WebSocket创建失败:', e);
        document.getElementById('speech-status').innerHTML = '⚠️ 语音识别连接失败，请刷新重试';
        return;
      }

      xfIatWebSocket.onopen = () => {
        console.log('[语音识别] 讯飞WebSocket已连接');
        // 开启麦克风并开始发送音频
        startXfRecording();
        // 55秒后自动重启（讯飞限制60秒）
        xfRestartTimer = setTimeout(() => {
          console.log('[语音识别] 达到55秒，自动重启会话');
          restartXfIat();
        }, 55000);
      };

      // 保存动态修正的中间结果
      let xfIntermediateText = '';

      xfIatWebSocket.onmessage = (event) => {
        try {
          const res = JSON.parse(event.data);
          if (res.code !== 0) {
            console.error('[语音识别] 讯飞返回错误:', res.code, res.message);
            return;
          }
          const data = res.data;
          if (data && data.result) {
            const result = data.result;
            const ws = result.ws;
            if (ws) {
              let text = '';
              ws.forEach(w => {
                w.cw.forEach(c => { text += c.w; });
              });

              // 处理动态修正 (dwa=wpgs)
              if (result.pgs === 'apd') {
                // 追加模式：将中间结果添加
                xfIntermediateText += text;
              } else if (result.pgs === 'rpl') {
                // 替换模式：替换最后一段中间结果
                const rg = result.rg; // [起始词序号, 结束词序号]
                if (rg) {
                  // 简化处理：用 xfResultText + text 重建
                  // 保留 rg[0] 之前的内容，替换 rg[0] 之后的内容
                  const wsList = xfResultText + xfIntermediateText;
                  // 对于替换，直接更新中间文本
                  xfIntermediateText = text; // 简化：直接用新文本替换中间部分
                } else {
                  xfIntermediateText = text;
                }
              }

              if (result.ls === 'true') {
                // 句子最终结果
                xfResultText += text;
                xfIntermediateText = '';
                currentSpeechText = xfResultText;
                console.log('[语音识别] 识别到文字:', text, '累计:', currentSpeechText);
              } else {
                // 中间结果，用于实时显示
                currentSpeechText = xfResultText + xfIntermediateText;
              }
            }
            if (currentSpeechText.trim() && !hasAnswered) {
              // 不向候选人展示识别内容，仅后台记录
            }
          }
          if (data && data.status === 2) {
            console.log('[语音识别] 讯飞会话结束(服务端)');
          }
        } catch(e) {
          console.error('[语音识别] 解析讯飞消息失败:', e);
        }
      };

      xfIatWebSocket.onerror = (e) => {
        console.error('[语音识别] WebSocket错误');
        if (xfRecognitionActive) {
          document.getElementById('speech-status').innerHTML = '⚠️ 语音识别连接异常，正在重试...';
          setTimeout(() => { if (xfRecognitionActive) connectXfIat(); }, 3000);
        }
      };

      xfIatWebSocket.onclose = (event) => {
        console.log('[语音识别] WebSocket关闭, code:', event.code, 'reason:', event.reason);
        // 讯飞超时关闭(code=1000)但识别仍在进行时也需要重连
        if (xfRecognitionActive) {
          stopXfRecording(); // 先清理录音资源
          setTimeout(() => { if (xfRecognitionActive) connectXfIat(); }, 2000);
        }
      };
    }

    // 启动录音并发送音频到讯飞
    async function startXfRecording() {
      try {
        // 复用已有的 mediaStream（摄像头已开启），如果没有则新建
        let stream = mediaStream;
        if (!stream) {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }

        xfAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        console.log('[语音识别] AudioContext 实际采样率:', xfAudioContext.sampleRate);
        xfMediaStreamSource = xfAudioContext.createMediaStreamSource(stream);
        // 使用较小的 bufferSize (2048) 以减少延迟
        xfScriptProcessor = xfAudioContext.createScriptProcessor(2048, 1, 1);

        // 讯飞协议：
        // 第一帧 status=0 只带业务参数，不发音频
        // 第二帧 status=1 开始发音频
        // 最后一帧 status=2 结束
        let frameCount = 0;

        // 先发送首帧（只有业务参数，无音频）
        if (xfIatWebSocket && xfIatWebSocket.readyState === WebSocket.OPEN) {
          const firstFrame = {
            common: { app_id: XF_APPID },
            business: {
              language: 'zh_cn',
              domain: 'iat',
              accent: 'mandarin',
              dwa: 'wpgs',
              vad_eos: 3000
            },
            data: { status: 0, format: 'audio-16k-16bit-1', encoding: 'raw', audio: '' }
          };
          xfIatWebSocket.send(JSON.stringify(firstFrame));
          console.log('[语音识别] 发送首帧（仅业务参数）');
        }

        xfScriptProcessor.onaudioprocess = (e) => {
          if (!xfRecognitionActive || !xfIatWebSocket || xfIatWebSocket.readyState !== WebSocket.OPEN) return;
          const pcmData = e.inputBuffer.getChannelData(0);
          const pcm16 = float32ToInt16(pcmData);
          const base64Data = arrayBufferToBase64(pcm16.buffer);

          const params = {
            data: { status: 1, format: 'audio-16k-16bit-1', encoding: 'raw', audio: base64Data }
          };
          try {
            xfIatWebSocket.send(JSON.stringify(params));
            frameCount++;
            if (frameCount % 50 === 0) {
              console.log('[语音识别] 已发送音频帧数:', frameCount, '数据大小:', base64Data.length, 'bytes');
            }
          } catch(e) {
            console.error('[语音识别] 发送音频帧失败:', e);
          }
        };

        xfMediaStreamSource.connect(xfScriptProcessor);
        xfScriptProcessor.connect(xfAudioContext.destination);
        console.log('[语音识别] 录音已启动，开始发送音频');
      } catch(e) {
        console.error('[语音识别] 录音启动失败:', e);
        document.getElementById('speech-status').innerHTML = '⚠️ 麦克风权限被拒绝，请允许麦克风访问';
      }
    }

    // Float32 → Int16 转换
    function float32ToInt16(float32Array) {
      const int16 = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return int16;
    }

    // ArrayBuffer → Base64
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    // 55秒自动重启（保持识别连续）
    function restartXfIat() {
      console.log('[语音识别] 重启讯飞会话（保持识别连续）');
      // 保存当前结果
      currentSpeechText = xfResultText;
      // 关闭当前WebSocket
      closeXfIatWebSocket();
      // 停止录音处理器
      stopXfRecording();
      // 重新连接
      if (xfRecognitionActive) {
        setTimeout(() => {
          connectXfIat();
        }, 300);
      }
    }

    // 关闭WebSocket
    function closeXfIatWebSocket() {
      if (xfIatWebSocket) {
        // 发送结束帧
        try {
          if (xfIatWebSocket.readyState === WebSocket.OPEN) {
            xfIatWebSocket.send(JSON.stringify({ data: { status: 2 } }));
          }
        } catch(e) {}
        try { xfIatWebSocket.close(1000); } catch(e) {}
        xfIatWebSocket = null;
      }
    }

    // 停止录音
    function stopXfRecording() {
      if (xfScriptProcessor) {
        xfScriptProcessor.disconnect();
        xfScriptProcessor = null;
      }
      if (xfMediaStreamSource) {
        xfMediaStreamSource.disconnect();
        xfMediaStreamSource = null;
      }
      if (xfAudioContext && xfAudioContext.state !== 'closed') {
        try { xfAudioContext.close(); } catch(e) {}
        xfAudioContext = null;
      }
    }

    // 停止自动识别
    function stopAutoRecognition() {
      console.log('[语音识别] 停止识别');
      autoRecognizing = false;
      isRecording = false;
      xfRecognitionActive = false;

      // 清除重启定时器
      if (xfRestartTimer) { clearTimeout(xfRestartTimer); xfRestartTimer = null; }

      // 保存当前识别结果
      if (xfResultText) { currentSpeechText = xfResultText; }

      closeXfIatWebSocket();
      stopXfRecording();
    }

    function updateActionButtons() {
      // 按钮始终显示，不需要条件判断
      if (currentQIdx < questions.length - 1) {
        document.getElementById('btn-next').style.display = 'inline-flex';
        document.getElementById('btn-finish').style.display = 'none';
      } else {
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-finish').style.display = 'inline-flex';
      }
    }

    function saveCurrentAnswer(text) {
      const q = questions[currentQIdx];
      if (!q) return;
      answers[q.id] = text;

      // 添加到转录记录
      transcript.push({
        role: 'candidate',
        content: text,
        questionId: q.id,
        time: new Date().toLocaleTimeString('zh-CN')
      });

      renderTranscript();
      updateActionButtons();
    }

    // ========== TTS 面试官提问 ==========
    function speakQuestion(text) {
      if (!speechSynth) return;
      speechSynth.cancel();

      // 清除之前的超时保护
      if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }

      // 先停止当前的语音识别（避免TTS声音被识别）
      stopAutoRecognition();

      document.getElementById('wave-anim').style.display = 'flex';

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.9;
      utterance.pitch = 1.0;

      const voices = speechSynth.getVoices();
      const zhVoice = voices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) utterance.voice = zhVoice;

      let recognitionStarted = false;
      const triggerRecognition = () => {
        if (recognitionStarted) return; // 防止重复触发
        recognitionStarted = true;
        if (ttsTimeout) { clearTimeout(ttsTimeout); ttsTimeout = null; }
        document.getElementById('wave-anim').style.display = 'none';
        console.log('[TTS] 播报结束，启动语音识别');
        startAutoRecognition();
      };

      utterance.onend = triggerRecognition;
      utterance.onerror = () => {
        console.warn('[TTS] 播报出错，仍然启动识别');
        triggerRecognition();
      };

      speechSynth.speak(utterance);

      // 超时保护：如果 TTS onend 在 15 秒内不触发，强制启动识别
      // 这处理 Chrome 的已知 bug：长文本 TTS onend 不触发
      const estimatedDuration = Math.max(text.length * 0.3, 8) * 1000; // 按文字长度估算
      ttsTimeout = setTimeout(() => {
        console.warn('[TTS] onend 超时未触发（' + (estimatedDuration/1000) + 's），强制启动识别');
        // 先尝试取消卡住的 TTS
        speechSynth.cancel();
        triggerRecognition();
      }, estimatedDuration);

      // 添加到转录
      transcript.push({
        role: 'interviewer',
        content: text,
        time: new Date().toLocaleTimeString('zh-CN')
      });
    }

    // ========== 渲染题目 ==========
    function renderQuestion() {
      if (currentQIdx >= questions.length) return;

      const q = questions[currentQIdx];
      currentSpeechText = '';
      hasAnswered = false;
      // 状态提示：面试官正在提问
      document.getElementById('speech-status').innerHTML = '🎤 面试官正在提问...';

      // 更新进度
      document.getElementById('q-progress-text').textContent = `问题 ${currentQIdx + 1} / ${questions.length}`;
      document.getElementById('q-text').textContent = q.question;
      document.getElementById('q-hint').textContent = '请用语音回答以下问题';

      // 进度点
      const dotsHtml = questions.map((_, i) => {
        let cls = 'progress-dot';
        if (i < currentQIdx) cls += ' done';
        else if (i === currentQIdx) cls += ' active';
        return `<div class="${cls}"></div>`;
      }).join('');
      document.getElementById('progress-dots').innerHTML = dotsHtml;

      // 按钮始终显示
      updateActionButtons();

      // 如果已有答案（回看）
      if (answers[q.id]) {
        currentSpeechText = answers[q.id];
        hasAnswered = true;
        document.getElementById('speech-status').innerHTML = '✅ 已回答，可直接点击下一题';
      }

      // 面试官语音提问（TTS播完后会自动启动语音识别）
      const greetings = [
        '好的，',
        '接下来，',
        '那么，',
        '很好，',
        '我想了解一下，'
      ];
      const prefix = currentQIdx === 0
        ? `你好！欢迎参加${interview.positions?.name || ''}岗位的面试。我是你的AI面试官李明。让我们开始吧。第一题：`
        : greetings[Math.floor(Math.random() * greetings.length)];
      speakQuestion(prefix + q.question);

      renderTranscript();
    }

    function nextQuestion() {
      if (isFinishing) return;
      // 停止当前语音识别
      stopAutoRecognition();
      // 如果说了话但还没保存，自动保存
      if (!hasAnswered && currentSpeechText.trim()) {
        saveCurrentAnswer(currentSpeechText.trim());
        // 不向候选人展示识别结果
      }
      // 检查是否有回答
      const q = questions[currentQIdx];
      if (!answers[q.id]) {
        if (!confirm('未检测到语音回答，确定跳过此题吗？')) {
          // 不跳过，重新启动识别
          startAutoRecognition();
          return;
        }
      }
      currentQIdx++;
      renderQuestion();
    }

    // ========== 转录记录（仅后台保存，不向候选人展示） ==========
    function renderTranscript() {
      // 不在候选人端渲染转录面板，仅保存数据
      // transcript-panel 始终隐藏
    }

    // ========== 计时器 ==========
    function updateTimer() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    // ========== 清理旧视频（保持总空间不超过 maxMB MB） ==========
    async function cleanupOldVideos(maxMB) {
      try {
        const { data: files, error } = await API.listInterviewVideos();
        if (error || !files || files.length === 0) return;

        // 计算总空间
        let totalSize = 0;
        const fileInfos = files
          .filter(f => f.name.endsWith('.webm') || f.name.endsWith('.mp4'))
          .map(f => {
            totalSize += f.metadata?.size || 0;
            return { name: f.name, size: f.metadata?.size || 0, created: f.created_at };
          })
          .sort((a, b) => new Date(a.created) - new Date(b.created)); // 按时间升序（最旧在前）

        const totalMB = totalSize / (1024 * 1024);
        console.log('[视频清理] 当前总空间:', totalMB.toFixed(2), 'MB, 文件数:', fileInfos.length);

        // 如果超过阈值，从最旧的开始删除
        if (totalMB > maxMB) {
          const toDelete = [];
          let currentSize = totalSize;

          for (const f of fileInfos) {
            if (currentSize <= maxMB * 1024 * 1024 * 0.8) break; // 清到80%就停
            toDelete.push(f.name);
            currentSize -= f.size;
          }

          if (toDelete.length > 0) {
            console.log('[视频清理] 删除', toDelete.length, '个旧视频，释放空间');
            await API.deleteInterviewVideo(toDelete[0]); // 逐个删除（Supabase限制）
            for (let i = 1; i < toDelete.length; i++) {
              await API.deleteInterviewVideo(toDelete[i]);
            }
            console.log('[视频清理] 清理完成');
          }
        }
      } catch(e) {
        console.error('[视频清理] 清理失败:', e);
      }
    }

    // ========== 完成面试 ==========
    async function finishInterview() {
      if (isFinishing) return;
      isFinishing = true;

      // 停止语音识别
      stopAutoRecognition();
      if (speechSynth) speechSynth.cancel();
      clearInterval(timerInterval);

      // 如果最后一题说了话但没保存
      if (!hasAnswered && currentSpeechText.trim()) {
        saveCurrentAnswer(currentSpeechText.trim());
      }

      // 检查最后一题是否已回答
      const lastQ = questions[currentQIdx];
      if (lastQ && !answers[lastQ.id]) {
        if (!confirm('您还未回答当前问题，确定要结束面试吗？')) {
          isFinishing = false;
          return;
        }
      }

      const durationSeconds = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;

      // 显示处理中状态
      document.getElementById('speech-status').innerHTML = '⏳ 正在保存面试数据...';

      // ====== 停止视频录制并上传 ======
      let videoBlob = null;
      try {
        videoBlob = await stopVideoRecording();
      } catch(e) {
        console.error('[视频录制] 停止录制失败:', e);
      }

      // 保存所有答案到数据库
      for (const q of questions) {
        if (answers[q.id]) {
          await API.submitAnswer(candidateId, q.id, answers[q.id]);
        }
      }

      // 保存面试记录
      const transcriptText = transcript.map(t =>
        `[${t.time}] ${t.role === 'interviewer' ? '面试官' : '候选人'}: ${t.content}`
      ).join('\n');

      await API.saveInterviewRecord(candidateId, {
        positionId: interview.positions?.id,
        transcript: transcriptText,
        durationSeconds,
        questionCount: questions.length,
        status: 'completed'
      });

      // ====== 上传视频到 Supabase Storage ======
      if (videoBlob) {
        document.getElementById('speech-status').innerHTML = '⏳ 正在上传面试视频...';
        try {
          // 先清理旧视频（保持总空间不超过800MB）
          await cleanupOldVideos(800);

          const now = new Date();
          const timestamp = now.toISOString().replace(/[:.]/g, '-').substring(0, 19);
          const fileName = `video_${candidateId}_${timestamp}.webm`;

          const { data: uploadData, error: uploadError } = await API.uploadInterviewVideo(
            candidateId, videoBlob, fileName
          );

          if (uploadError) {
            console.error('[视频上传] 上传失败:', uploadError);
          } else {
            console.log('[视频上传] 上传成功:', fileName);

            // 获取视频公开URL并保存到面试记录
            const videoUrl = API.getInterviewVideoUrl(fileName);
            // 更新面试记录，添加视频URL
            await supabaseClient
              .from('interview_records')
              .update({ video_url: videoUrl })
              .eq('candidate_id', candidateId);
          }
        } catch(e) {
          console.error('[视频上传] 上传异常:', e);
        }
      }

      // 更新邀请状态为已完成
      if (interview.id) {
        API.updateInviteStatus(interview.id, 'completed');
      }

      // 停止摄像头
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
      }

      // 显示完成页（感谢页，无任何下载按钮）
      hideAll();
      document.getElementById('complete-page').style.display = 'flex';
      const m = Math.floor(durationSeconds / 60);
      const s = durationSeconds % 60;
      document.getElementById('complete-text').innerHTML = `
        感谢您参加 <strong>${interview.positions?.name || ''}</strong> 岗位的面试！<br>
        面试时长：${m}分${s}秒 · 共回答 ${Object.keys(answers).length} 题<br><br>
        我们会尽快与您联系，请保持电话/邮箱畅通。
      `;
    }

    // ========== 加载语音 ==========
    if (speechSynth) {
      speechSynth.onvoiceschanged = () => speechSynth.getVoices();
    }

    // 启动
    init();
  </script>
</body>
