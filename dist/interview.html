<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面试系统 - 候选人端</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
    
    .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
    
    /* 头部 */
    .header { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { color: #1890ff; font-size: 24px; margin-bottom: 8px; }
    .header p { color: #666; }
    
    /* 卡片 */
    .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    
    /* 步骤 */
    .steps { display: flex; justify-content: center; margin-bottom: 32px; }
    .step { display: flex; align-items: center; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; color: #666; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .step.active .step-num { background: #1890ff; color: #fff; }
    .step.completed .step-num { background: #52c41a; color: #fff; }
    .step-label { margin-left: 8px; color: #666; }
    .step.active .step-label { color: #1890ff; font-weight: 500; }
    .step-line { width: 60px; height: 2px; background: #e0e0e0; margin: 0 16px; }
    .step.completed + .step-line, .step-line.completed { background: #52c41a; }
    
    /* 表单 */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 16px; }
    .form-input:focus { border-color: #40a9ff; outline: none; }
    .input-icon { position: relative; }
    .input-icon .form-input { padding-left: 40px; }
    .input-icon::before { content: ''; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; background: #ccc; border-radius: 50%; }
    
    /* 按钮 */
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    
    /* 问题 */
    .question { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #f0f0f0; }
    .question:last-child { border-bottom: none; }
    .question-num { color: #1890ff; font-weight: bold; margin-right: 8px; }
    .question-text { font-size: 16px; font-weight: 500; margin-bottom: 12px; line-height: 1.6; }
    .question textarea { width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; resize: vertical; min-height: 100px; }
    .question textarea:focus { border-color: #40a9ff; outline: none; }
    
    /* 进度 */
    .progress-bar { display: flex; justify-content: space-between; margin-bottom: 16px; color: #666; font-size: 14px; }
    
    /* 完成页 */
    .success-page { text-align: center; padding: 60px 20px; }
    .success-icon { width: 80px; height: 80px; background: #52c41a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .success-icon::before { content: '✓'; font-size: 40px; color: #fff; }
    .success-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
    .success-text { color: #666; }
    
    /* 加载 */
    .loading { text-align: center; padding: 60px; color: #999; }
    
    /* 错误 */
    .error-page { text-align: center; padding: 60px 20px; }
    .error-icon { width: 80px; height: 80px; background: #ff4d4f; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .error-icon::before { content: '✕'; font-size: 40px; color: #fff; }
    .error-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
    .error-text { color: #666; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">加载中...</div>
  </div>

  <script>
    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const interviewLink = urlParams.get('link');
    
    let interview = null;
    let candidateId = null;
    let currentStep = 0; // 0: 填写信息, 1: 答题, 2: 完成
    let answers = {};
    
    // 初始化
    async function init() {
      if (!interviewLink) {
        showError('缺少面试链接参数');
        return;
      }
      
      if (!initSupabase()) {
        showError('系统加载失败，请刷新重试');
        return;
      }
      
      const { data, error } = await API.getInterviewByLink(interviewLink);
      
      if (error || !data) {
        showError('面试邀请不存在或已过期');
        return;
      }
      
      if (data.status === 'cancelled') {
        showError('此面试邀请已被取消');
        return;
      }
      
      if (data.expires_at && new Date(data.expires_at) < new Date()) {
        showError('面试邀请已过期');
        return;
      }
      
      interview = data;
      
      // 初始化答案对象
      interview.questions?.forEach(q => {
        answers[q.id] = '';
      });
      
      render();
    }
    
    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="error-page">
          <div class="error-icon"></div>
          <div class="error-title">无法开始面试</div>
          <div class="error-text">${message}</div>
        </div>
      `;
    }
    
    function render() {
      const app = document.getElementById('app');
      
      if (currentStep === 0) {
        renderRegister(app);
      } else if (currentStep === 1) {
        renderQuestions(app);
      } else {
        renderComplete(app);
      }
    }
    
    function renderRegister(app) {
      app.innerHTML = `
        <div class="header">
          <h1>${interview.positions?.name || '面试邀请'}</h1>
          <p>欢迎参加面试，请先填写您的基本信息</p>
        </div>
        
        <div class="card">
          <div class="steps">
            <div class="step active">
              <div class="step-num">1</div>
              <div class="step-label">填写信息</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
              <div class="step-num">2</div>
              <div class="step-label">回答问题</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
              <div class="step-num">3</div>
              <div class="step-label">完成</div>
            </div>
          </div>
          
          <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
              <label class="form-label">姓名 *</label>
              <input type="text" id="name" class="form-input" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
              <label class="form-label">邮箱 *</label>
              <input type="email" id="email" class="form-input" placeholder="请输入您的邮箱" required>
            </div>
            <div class="form-group">
              <label class="form-label">电话</label>
              <input type="tel" id="phone" class="form-input" placeholder="请输入您的联系电话（选填）">
            </div>
            <button type="submit" class="btn btn-primary">开始面试</button>
          </form>
        </div>
      `;
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      
      if (!name || !email) {
        alert('请填写必填信息');
        return;
      }
      
      const { data, error } = await API.createCandidate(name, email, phone, interview.positions?.id, interviewLink);
      
      if (error) {
        alert('提交失败，请重试');
        return;
      }
      
      candidateId = data[0].id;
      currentStep = 1;
      render();
    }
    
    function renderQuestions(app) {
      const questions = interview.questions || [];
      const answeredCount = Object.values(answers).filter(a => a.trim()).length;
      
      app.innerHTML = `
        <div class="header">
          <h1>${interview.positions?.name || '面试问题'}</h1>
          <p>请认真回答以下问题</p>
        </div>
        
        <div class="card">
          <div class="steps">
            <div class="step completed">
              <div class="step-num">✓</div>
              <div class="step-label">填写信息</div>
            </div>
            <div class="step-line completed"></div>
            <div class="step active">
              <div class="step-num">2</div>
              <div class="step-label">回答问题</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
              <div class="step-num">3</div>
              <div class="step-label">完成</div>
            </div>
          </div>
          
          <div class="progress-bar">
            <span>已回答: ${answeredCount} / ${questions.length}</span>
            <span>${Math.round((answeredCount / questions.length) * 100)}%</span>
          </div>
          
          ${questions.map((q, i) => `
            <div class="question">
              <div class="question-text">
                <span class="question-num">Q${i + 1}.</span>
                ${q.question}
              </div>
              <textarea 
                id="answer-${q.id}" 
                placeholder="请输入您的回答..."
                onchange="saveAnswer(${q.id}, this.value)"
              >${answers[q.id] || ''}</textarea>
            </div>
          `).join('')}
          
          <button class="btn btn-primary" onclick="submitAnswers()" ${answeredCount < questions.length ? 'disabled' : ''}>
            ${answeredCount < questions.length ? `请回答所有问题 (${answeredCount}/${questions.length})` : '提交答案'}
          </button>
        </div>
      `;
    }
    
    function saveAnswer(questionId, value) {
      answers[questionId] = value;
      
      // 更新进度
      const questions = interview.questions || [];
      const answeredCount = Object.values(answers).filter(a => a.trim()).length;
      const progressText = document.querySelector('.progress-bar span');
      if (progressText) {
        progressText.innerHTML = `<span>已回答: ${answeredCount} / ${questions.length}</span><span>${Math.round((answeredCount / questions.length) * 100)}%</span>`;
      }
      
      // 更新按钮状态
      const btn = document.querySelector('.btn-primary');
      if (btn) {
        if (answeredCount >= questions.length) {
          btn.disabled = false;
          btn.textContent = '提交答案';
        }
      }
    }
    
    async function submitAnswers() {
      const questions = interview.questions || [];
      const unanswered = questions.filter(q => !answers[q.id]?.trim());
      
      if (unanswered.length > 0) {
        alert('还有 ' + unanswered.length + ' 道题目未回答');
        return;
      }
      
      // 提交所有答案
      for (const q of questions) {
        await API.submitAnswer(candidateId, q.id, answers[q.id]);
      }
      
      currentStep = 2;
      render();
    }
    
    function renderComplete(app) {
      app.innerHTML = `
        <div class="card">
          <div class="steps">
            <div class="step completed">
              <div class="step-num">✓</div>
              <div class="step-label">填写信息</div>
            </div>
            <div class="step-line completed"></div>
            <div class="step completed">
              <div class="step-num">✓</div>
              <div class="step-label">回答问题</div>
            </div>
            <div class="step-line completed"></div>
            <div class="step completed">
              <div class="step-num">✓</div>
              <div class="step-label">完成</div>
            </div>
          </div>
          
          <div class="success-page">
            <div class="success-icon"></div>
            <div class="success-title">面试已完成</div>
            <div class="success-text">
              感谢您参加 ${interview.positions?.name || '本岗位'} 的面试！<br>
              我们会尽快与您联系，请保持电话/邮箱畅通。
            </div>
          </div>
        </div>
      `;
    }
    
    // 启动
    init();
  </script>
</body>
</html>
